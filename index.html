<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="description" content="DirectGo 直达常用平台搜索，少干扰、更高效。支持知乎、微博、小红书、哔哩哔哩等平台。">
    <meta name="google-site-verification" content="nXbYRKUwXwReStmNMFc4euXmHP3ZDSE7eVSnOjnof7U" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0e0e10" media="(prefers-color-scheme: dark)">
    <title>DirectGo 直达 | 常用平台搜索入口</title>
    <link rel="stylesheet" href="styles.css">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "DirectGo 直达",
  "description": "纯净平台内容搜索引擎，直达知乎、微博、小红书等平台内容",
  "applicationCategory": "SearchApplication",
  "operatingSystem": "Any"
}
</script>
</head>
<body>
    <div class="container">
        <!-- 首屏：标题 -->
        <div class="header">
            <h1 class="title">DirectGo</h1>
            <p class="subtitle">一个搜索框，直达内容，不进信息流</p>
        </div>

        <!-- 首屏：唯一的核心动作 -->
        <div class="search">
            <span class="search-icon">⌕</span>
            <input
                type="text"
                id="keyword-input"
                placeholder="搜索什么…  试试「zh AI Agent」"
                autocomplete="off"
                autofocus
            >
            <button class="search-btn" id="search-btn" type="button" aria-label="搜索">→</button>
        </div>
        <p class="hint">输入「平台 + 关键词」直达，或留空用 <kbd>Bing</kbd> · 按 <kbd>Enter</kbd> 走</p>

        <!-- 高级选项：默认收起，把复杂藏起来 -->
        <details class="advanced">
            <summary>更多选项</summary>
            <div class="advanced-body">

                <div class="field-row">
                    <label class="field-label" for="platform-input">指定平台（可填别名）</label>
                    <input
                        type="text"
                        id="platform-input"
                        placeholder="如：知乎 / zh / xhs（留空默认 Bing）"
                        autocomplete="off"
                    >
                </div>

                <div class="field-row">
                    <label class="field-label">打开方式</label>
                    <div class="segmented">
                        <label>
                            <input type="radio" id="browse-mode-web" name="browse-mode" value="web" checked>
                            <span>Web</span>
                        </label>
                        <label>
                            <input type="radio" id="browse-mode-scheme" name="browse-mode" value="scheme">
                            <span>Scheme</span>
                        </label>
                        <label>
                            <input type="radio" id="browse-mode-intent" name="browse-mode" value="intent">
                            <span>Intent</span>
                        </label>
                    </div>
                    <p class="mode-hint">Web 通用；Scheme/Intent 优先调起 App，不支持时自动回退 Web。</p>
                </div>

                <div class="field-row">
                    <label class="field-label">常用平台 · 可拖动排序</label>
                    <div class="platform-tags" id="platform-tags">
                        <button class="platform-tag" draggable="true" data-platform="zhihu" type="button">知乎</button>
                        <button class="platform-tag" draggable="true" data-platform="xiaohongshu" type="button">小红书</button>
                        <button class="platform-tag" draggable="true" data-platform="weibo" type="button">微博</button>
                        <button class="platform-tag" draggable="true" data-platform="bilibili" type="button">哔哩哔哩</button>
                        <button class="platform-tag" draggable="true" data-platform="bing" type="button">Bing</button>
                        <button class="platform-tag" draggable="true" data-platform="github" type="button">GitHub</button>
                        <button class="platform-tag" draggable="true" data-platform="amap" type="button">高德地图</button>
                        <button class="platform-tag" draggable="true" data-platform="taobao" type="button">淘宝</button>
                        <button class="platform-tag" draggable="true" data-platform="jd" type="button">京东</button>
                        <button class="platform-tag" draggable="true" data-platform="pinduoduo" type="button">拼多多</button>
                    </div>
                    <div class="reset-row">
                        <span class="alias-info">拖动调整顺序，自动保存</span>
                        <button id="reset-order-btn" class="text-btn" type="button">恢复默认</button>
                    </div>
                </div>

                <details class="help-details">
                    <summary>查看示例与别名</summary>
                    <div class="help-details-content">
                        例：知乎 AI Agent｜小红书 春季穿搭<br>
                        支持别名：知乎/zh、小红书/xhs、微博/wb、哔哩哔哩/bl/b站、必应/bing、GitHub/gh、高德地图/gd/dt/地图、淘宝/tb、京东/jd、拼多多/pdd<br>
                        快捷命令：在搜索框直接输入「zh AI Agent」也可自动识别平台
                    </div>
                </details>

            </div>
        </details>

        <!-- 消息提示区域 -->
        <div id="message-div" class="message" role="status" aria-live="polite" style="display: none;"></div>

        <!-- 版本日期水印 -->
        <div class="version-watermark">2026-07-09</div>

    <script src="app.js"></script>
</body>
</html>
